<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MediCare+</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-layout {
            display: flex;
            min-height: calc(100vh - 90px);
            margin-top: 90px;
            background: var(--bg-main);
        }
        .sidebar {
            width: 250px;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border);
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .sidebar a {
            padding: 1rem 2rem;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border-right: 3px solid var(--primary);
        }
        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
            transform: translateY(-5px);
        }
        .stat-card .icon {
            width: 4rem;
            height: 4rem;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.1);
            color: var(--primary);
            border: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .table-container {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            color: var(--text-main);
        }
        th, td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: rgba(255, 255, 255, 0.02);
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .status-badge {
            padding: 0.35rem 0.85rem;
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid currentColor;
        }
        .status-pending { background: rgba(217, 119, 6, 0.1); color: #FCD34D; }
        .status-confirmed { background: rgba(22, 101, 52, 0.1); color: #86EFAC; }
        .status-cancelled { background: rgba(153, 27, 27, 0.1); color: #FCA5A5; }

        @media (max-width: 768px) {
            .admin-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { padding: 1.5rem; }
            .table-container { overflow-x: auto; }
        }
    </style>
</head>
<body id="adminDashboard">

    <header>
        <div class="container nav-container" style="max-width: 100%; padding: 0 2rem;">
            <a href="index.html" class="logo"><i class="fas fa-heartbeat"></i> MediCare<span class="text-primary">+</span> Admin</a>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <a href="index.html" class="btn btn-outline">Back to Site</a>
            </div>
        </div>
    </header>

    <div class="admin-layout animate-on-scroll is-visible">
        <div class="sidebar">
            <a href="#" class="active"><i class="fas fa-calendar-check"></i> Appointments</a>
            <a href="#"><i class="fas fa-users"></i> Patients</a>
            <a href="#"><i class="fas fa-envelope"></i> Messages</a>
            <a href="#"><i class="fas fa-cog"></i> Settings</a>
        </div>
        
        <div class="main-content">
            <h2 style="margin-bottom: 2rem; font-size: 2.5rem;" class="text-gradient">Dashboard Overview</h2>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon"><i class="fas fa-user-injured"></i></div>
                    <div>
                        <h3 id="statTotalPatients" style="font-size: 2.5rem; line-height: 1;">--</h3>
                        <p class="text-muted">Total Patients</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="icon"><i class="fas fa-calendar-plus"></i></div>
                    <div>
                        <h3 id="statUpcoming" style="font-size: 2.5rem; line-height: 1;">--</h3>
                        <p class="text-muted">Upcoming</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="icon"><i class="fas fa-star"></i></div>
                    <div>
                        <h3 id="statSatisfaction" style="font-size: 2.5rem; line-height: 1;">--</h3>
                        <p class="text-muted">Satisfaction Rate</p>
                    </div>
                </div>
            </div>
            
            <h3 style="margin-bottom: 1.5rem; font-size: 1.8rem;">Recent Appointments</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patient Name</th>
                            <th>Date & Time</th>
                            <th>Department</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTableBody">
                        <tr>
                            <td colspan="6" class="text-center text-muted">Loading appointments...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
